parameters: []
materials:
- name: si
  index_expr: sqrt(12)
geometries:
- name: circ
  kind: circle
  material: si
  props:
    center_x: '0'
    center_y: '0'
    radius: '0.2'
sources: []
domain:
  cell_x: '10'
  cell_y: '10'
  resolution: '20'
  pml_width: '1'
  pml_mode: both
flux_monitors: []
analysis:
  kind: mpb_modesolver
  field_animation:
    component: Ez
    duration: '200'
    interval: '1'
    fps: '20'
    output_dir: ''
    output_name: animation.mp4
  harminv:
    component: Ez
    point_x: '0'
    point_y: '0'
    fcen: '0.15'
    df: '0.1'
    until_after_sources: '200'
    animation_interval: '1'
    animation_fps: '20'
    output_dir: ''
    output_name: harminv_animation.mp4
    harminv_log_path: harminv.txt
  transmission_spectrum:
    incident_monitor: ''
    transmission_monitor: ''
    reflection_monitor: ''
    reference_reflection_monitor: ''
    until_after_sources: '200'
    animate_reference: false
    animate_scattering: false
    animation_component: Ez
    animation_interval: '1'
    animation_fps: '20'
    output_dir: ''
    output_prefix: transmission
    preview_domain: scattering
    reference_state:
      domain:
        cell_x: '10'
        cell_y: '10'
        resolution: '20'
        pml_width: '1'
        pml_mode: both
      geometries: []
      sources: []
      flux_monitors: []
  mpb_modesolver:
    lattice_x: '1'
    lattice_y: '1'
    basis1_x: sqrt(3)/2
    basis1_y: '0.5'
    basis2_x: sqrt(3)/2
    basis2_y: '-0.5'
    num_bands: '8'
    resolution: '32'
    unit_cells: '7'
    kpoint_interp: '10'
    max_mode_images: '64'
    run_tm: true
    run_te: true
    kpoints:
    - kx: '0'
      ky: '0'
    - kx: '0'
      ky: '0.5'
    - kx: -1/3
      ky: 1/3
    - kx: '0'
      ky: '0'
    field_kpoints:
    - kx: -1/3
      ky: 1/3
    - kx: -1/2
      ky: 1/2
sweep:
  enabled: false
  max_points: '64'
  allow_large: false
  params: []
